openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: patients
    description: Patient data
  - name: notes
    description: Clinical notes
  - name: audit
    description: Compliance + access logs
  - name: admin
    description: Administrative operations (role-gated)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /auth/signup:
    post:
      operationId: signup
      tags: [auth]
      summary: Create a new provider account and sign in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
      responses:
        "201":
          description: Account created and session started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "400":
          description: Validation failed
        "409":
          description: An account with this email already exists
  /auth/password-reset/request:
    post:
      operationId: requestPasswordReset
      tags: [auth]
      summary: Send a password-reset link to an email
      description: >-
        Always returns 204 — we don't reveal whether the email belongs to
        a real account (user-enumeration defense).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordResetRequest"
      responses:
        "204":
          description: Request accepted
  /auth/password-reset/confirm:
    post:
      operationId: confirmPasswordReset
      tags: [auth]
      summary: Set a new password using a reset token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordResetConfirm"
      responses:
        "200":
          description: Password updated and session started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "400":
          description: Invalid, expired, or already-used token
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Sign in with email + password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Signed in; sets the session cookie
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Invalid credentials
  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Sign out the current session
      responses:
        "204":
          description: Signed out
  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get the signed-in user
      responses:
        "200":
          description: The signed-in user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not signed in
  /users:
    get:
      operationId: listUsers
      tags: [admin]
      summary: List all users (admin only)
      responses:
        "200":
          description: A list of users
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdminUser"
        "403":
          description: Caller is not an admin
  /users/{id}:
    patch:
      operationId: updateUser
      tags: [admin]
      summary: Update a user's role (admin only)
      description: >-
        Currently only the `role` field is mutable. Self-demotion (an
        admin downgrading their own account) is refused so the system
        can't be left without any admin.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "400":
          description: Validation failed
        "403":
          description: Caller is not an admin, or attempting to demote self
        "404":
          description: User not found
  /audit-log:
    get:
      operationId: listAuditLog
      tags: [audit]
      summary: List audit log entries
      description: >-
        Returns audit log entries, newest first. Cursor-pagination via
        `before` + `limit`. Optional filters on userId, resourceType,
        and action.
      parameters:
        - name: before
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
        - name: userId
          in: query
          required: false
          schema:
            type: string
        - name: resourceType
          in: query
          required: false
          schema:
            type: string
        - name: action
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: A page of audit entries
          content:
            application/json:
              schema:
                type: object
                required: [data, nextCursor]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AuditLogEntry"
                  nextCursor:
                    type: ["string", "null"]
                    format: date-time
  /patients:
    get:
      operationId: listPatients
      tags: [patients]
      summary: List patients
      description: Returns the patients accessible to the signed-in provider.
      responses:
        "200":
          description: A list of patients
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Patient"
    post:
      operationId: createPatient
      tags: [patients]
      summary: Onboard a new patient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePatientRequest"
      responses:
        "201":
          description: Patient created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"
        "409":
          description: A patient with this MRN already exists
  /patients/sync:
    post:
      operationId: syncPatientFromEhr
      tags: [patients]
      summary: Pull a patient from the configured EHR
      description: >-
        Reads `Patient/{externalId}` from the EHR named by `EHR_MODE`
        and upserts the local row keyed on MRN. Returns 201 when a new
        row was inserted and 200 when an existing row was refreshed.
        Mock mode (EHR_MODE unset) synthesizes demographics from the id
        for local development.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncPatientRequest"
      responses:
        "200":
          description: Existing patient refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncedPatient"
        "201":
          description: New patient inserted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncedPatient"
        "400":
          description: External id missing or empty
        "404":
          description: The EHR returned no patient for this external id
        "422":
          description: The EHR record was missing fields HaloNote requires
        "502":
          description: The EHR returned an error
  /notes:
    get:
      operationId: listNotes
      tags: [notes]
      summary: List clinical notes
      description: >-
        Returns notes the signed-in provider can see, newest first. When
        `patientId` is supplied, only notes for that patient are returned.
        Cursor-based pagination via `before` + `limit` — pass the previous
        response's `nextCursor` to fetch the next page.
      parameters:
        - name: patientId
          in: query
          required: false
          schema:
            type: string
        - name: before
          in: query
          required: false
          description: ISO 8601 timestamp; returns notes created strictly before this.
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          required: false
          description: Page size. Defaults to 50, max 200.
          schema:
            type: integer
            minimum: 1
            maximum: 200
      responses:
        "200":
          description: A list of notes
          content:
            application/json:
              schema:
                type: object
                required: [data, nextCursor]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Note"
                  nextCursor:
                    type: ["string", "null"]
                    format: date-time
                    description: Pass back as `before` to load the next page. Null when no more rows.
    post:
      operationId: createNote
      tags: [notes]
      summary: Create a clinical note
      description: Persist a free-text clinical note attached to a patient.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNoteRequest"
      responses:
        "201":
          description: Note created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
  /notes/{id}:
    get:
      operationId: getNote
      tags: [notes]
      summary: Read a single note
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
        "404":
          description: Note not found
    delete:
      operationId: deleteNote
      tags: [notes]
      summary: Soft-delete a note
      description: >-
        Marks the note status as entered-in-error. The row stays in the
        database for audit and amendment-chain integrity; the UI treats
        it as withdrawn. Clinical data is never hard-deleted.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Note marked entered-in-error
        "404":
          description: Note not found
    patch:
      operationId: updateNote
      tags: [notes]
      summary: Edit a note's body
      description: >-
        Update the free-text body of an existing note. The patient,
        author, and EHR status are immutable through this endpoint —
        re-send to the EHR via POST /notes/{id}/send-to-ehr if you want
        downstream to reflect the edit.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNoteRequest"
      responses:
        "200":
          description: The updated note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
        "404":
          description: Note not found
  /notes/{id}/send-to-ehr:
    post:
      operationId: sendNoteToEhr
      tags: [notes]
      summary: Send a note to the configured EHR
      description: >-
        Build a FHIR DocumentReference from the stored note and push it to
        the configured EHR provider. When no provider is configured, runs in
        mock mode and returns a synthetic document reference.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Pushed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EhrPushResult"
        "404":
          description: Note or patient not found
        "502":
          description: EHR rejected the document
  /schedule/today:
    get:
      operationId: getTodaySchedule
      tags: [schedule]
      summary: Appointments for the signed-in provider on a given day
      description: >-
        Returns appointments from the configured EHR for the requested
        local-date (defaults to today), scoped to the calling user's
        `ehrPractitionerId`. Returns 409 if the user is not linked to
        an EHR practitioner yet. Mock mode returns a synthetic roster
        when EHR_MODE is unset.
      parameters:
        - in: query
          name: date
          required: false
          schema:
            type: string
            pattern: "^\\d{4}-\\d{2}-\\d{2}$"
          description: >-
            Local-date in YYYY-MM-DD. If omitted, today's date is used.
      responses:
        "200":
          description: Schedule
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ScheduledAppointment"
        "400":
          description: date query param is not in YYYY-MM-DD format
        "409":
          description: Caller has no ehrPractitionerId set
        "502":
          description: EHR returned an error
  /patients/{id}/history:
    get:
      operationId: getPatientHistory
      tags: [patients]
      summary: Active problems, medications, and allergies for a patient
      description: >-
        Pulls Condition (active), MedicationRequest (active), and
        AllergyIntolerance resources from the configured EHR in parallel
        and shapes them for a note-prep panel. The patient id parameter
        is the EHR Patient.id (same value used for /patients/sync).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Patient history snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientHistory"
        "502":
          description: EHR returned an error
  /templates:
    get:
      operationId: listTemplates
      tags: [templates]
      summary: List the signed-in provider's note templates
      description: >-
        Returns the calling user's dictation templates, sorted by
        their manual ordering. On the user's first call, the server
        seeds the account with a default template set (SOAP, H&P,
        Progress, Consult, Discharge) so no provider sees an empty
        list.
      responses:
        "200":
          description: Templates
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/NoteTemplate"
    post:
      operationId: createTemplate
      tags: [templates]
      summary: Create a new template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTemplateRequest"
      responses:
        "201":
          description: Template created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NoteTemplate"
        "409":
          description: voiceCue already used by another of the caller's templates
    put:
      operationId: reorderTemplates
      tags: [templates]
      summary: Replace the manual sort order for the caller's templates
      description: >-
        Accepts the full list of template ids in the new desired order.
        Any ids the caller doesn't own are rejected. Returns the
        updated list in its new order.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReorderTemplatesRequest"
      responses:
        "200":
          description: Templates re-ordered
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/NoteTemplate"
        "400":
          description: ids list missing a template the caller owns, or includes one they don't
  /templates/{id}:
    patch:
      operationId: updateTemplate
      tags: [templates]
      summary: Edit a template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTemplateRequest"
      responses:
        "200":
          description: Template updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NoteTemplate"
        "404":
          description: Template not found (or not owned by caller)
        "409":
          description: voiceCue collides with another of the caller's templates
    delete:
      operationId: deleteTemplate
      tags: [templates]
      summary: Delete a template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Template deleted
        "404":
          description: Template not found (or not owned by caller)
  /templates/reset:
    post:
      operationId: resetTemplates
      tags: [templates]
      summary: Replace the caller's templates with the default set
      description: >-
        Deletes all of the caller's existing templates and re-seeds the
        defaults. Useful when a provider wants a clean slate after
        experimenting.
      responses:
        "200":
          description: Templates reset to defaults
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/NoteTemplate"
  /auth/ehr/status:
    get:
      operationId: getEhrConnectionStatus
      tags: [ehr-auth]
      summary: Current EHR connection status for the signed-in provider
      description: >-
        Returns whether the caller has an active SMART OAuth connection
        to each supported provider, plus the practitioner id we resolved
        from the OAuth context and when the access token expires.
      responses:
        "200":
          description: Status snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EhrConnectionStatus"
  /auth/ehr/{provider}/start:
    post:
      operationId: startEhrOauth
      tags: [ehr-auth]
      summary: Begin a SMART OAuth handshake with the configured EHR
      description: >-
        Generates a PKCE-protected authorize URL the browser should
        navigate to. The browser is expected to follow the URL — Athena
        will redirect back to /api/auth/ehr/callback with a code, which
        the server exchanges for tokens.
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [athenahealth, epic]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartEhrOauthRequest"
      responses:
        "200":
          description: Authorize URL to redirect the browser to
          content:
            application/json:
              schema:
                type: object
                required: [authorizeUrl]
                properties:
                  authorizeUrl:
                    type: string
        "400":
          description: Unknown provider
  /auth/ehr/{provider}:
    delete:
      operationId: disconnectEhr
      tags: [ehr-auth]
      summary: Drop the caller's SMART OAuth tokens for a provider
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [athenahealth, epic]
      responses:
        "204":
          description: Connection deleted
        "404":
          description: No active connection for this provider
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Patient:
      type: object
      required: [id, firstName, lastName, dateOfBirth, mrn]
      properties:
        id:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        # ISO 8601 date, e.g. "1985-04-12"
        dateOfBirth:
          type: string
        mrn:
          type: string
          description: Medical record number
    Note:
      type: object
      required:
        - id
        - patientId
        - body
        - createdAt
        - updatedAt
        - author
        - status
        - replacesNoteId
        - ehrProvider
        - ehrDocumentRef
        - ehrPushedAt
        - ehrError
      properties:
        id:
          type: string
        patientId:
          type: string
        body:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          description: Most recent edit; equal to createdAt when the note has not been edited.
        author:
          oneOf:
            - $ref: "#/components/schemas/NoteAuthor"
            - type: "null"
        status:
          type: string
          enum: [active, entered-in-error]
          description: "active = current. entered-in-error = soft-deleted; the row stays for audit traceability but the UI treats it as withdrawn."
        replacesNoteId:
          type: ["string", "null"]
          description: When set, this note supersedes the referenced one (FHIR DocumentReference relatesTo replaces).
        ehrProvider:
          type: ["string", "null"]
          description: "Provider that received this note, e.g. \"athenahealth\", \"epic\", \"mock\". Null until pushed."
        ehrDocumentRef:
          type: ["string", "null"]
          description: FHIR DocumentReference returned by the EHR. Null until pushed.
        ehrPushedAt:
          type: ["string", "null"]
          format: date-time
        ehrError:
          type: ["string", "null"]
          description: Last EHR push error message, if any.
    CreateNoteRequest:
      type: object
      required: [patientId, body]
      properties:
        patientId:
          type: string
        body:
          type: string
          minLength: 1
        replacesNoteId:
          type: string
          description: When set, the new note supersedes this one. The original is preserved with status active; downstream EHR pushes carry relatesTo replaces.
    UpdateNoteRequest:
      type: object
      required: [body]
      properties:
        body:
          type: string
          minLength: 1
    CreatePatientRequest:
      type: object
      required: [firstName, lastName, dateOfBirth, mrn]
      properties:
        firstName:
          type: string
          minLength: 1
        lastName:
          type: string
          minLength: 1
        dateOfBirth:
          type: string
          description: ISO 8601 date, e.g. "1985-04-12"
          pattern: "^\\d{4}-\\d{2}-\\d{2}$"
        mrn:
          type: string
          minLength: 1
          description: Medical record number. Must be unique.
    SyncPatientRequest:
      type: object
      required: [externalId]
      properties:
        externalId:
          type: string
          minLength: 1
          description: The EHR-side patient id to read (e.g. FHIR Patient.id).
    SyncedPatient:
      type: object
      required: [id, firstName, lastName, dateOfBirth, mrn, synced]
      properties:
        id:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        dateOfBirth:
          type: string
        mrn:
          type: string
        synced:
          type: object
          required: [provider, created]
          properties:
            provider:
              type: string
              enum: [athenahealth, epic, mock]
            created:
              type: boolean
              description: True when this call inserted a new row; false when it refreshed.
    AuthUser:
      type: object
      required: [id, email, displayName, role]
      properties:
        id:
          type: string
        email:
          type: string
        displayName:
          type: string
        role:
          type: string
          enum: [admin, member]
        twoFactorEnabled:
          type: boolean
          description: True when the user has TOTP 2FA enrolled.
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string
          minLength: 1
    SignupRequest:
      type: object
      required: [email, password, displayName]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          maxLength: 200
        displayName:
          type: string
          minLength: 1
          maxLength: 200
    PasswordResetRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
    PasswordResetConfirm:
      type: object
      required: [token, password]
      properties:
        token:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 8
          maxLength: 200
    AdminUser:
      type: object
      required: [id, email, displayName, role, createdAt]
      properties:
        id:
          type: string
        email:
          type: string
        displayName:
          type: string
        role:
          type: string
          enum: [admin, member]
        ehrPractitionerId:
          type: ["string", "null"]
          description: Provider's Practitioner.id in the connected EHR; used to scope schedule queries.
        createdAt:
          type: string
          format: date-time
    UpdateUserRequest:
      type: object
      properties:
        role:
          type: string
          enum: [admin, member]
        ehrPractitionerId:
          type: ["string", "null"]
          description: Set or clear the user's EHR Practitioner.id. Pass null to unlink.
    AuditLogEntry:
      type: object
      required:
        - id
        - userId
        - userDisplayName
        - action
        - resourceType
        - resourceId
        - metadata
        - at
      properties:
        id:
          type: string
        userId:
          type: ["string", "null"]
        userDisplayName:
          type: ["string", "null"]
          description: >-
            Joined from the users table at read time; null for entries
            whose user has since been deleted, or system-originated events.
        action:
          type: string
        resourceType:
          type: string
        resourceId:
          type: ["string", "null"]
        metadata:
          type: ["object", "null"]
          additionalProperties: true
        at:
          type: string
          format: date-time
    NoteAuthor:
      type: object
      required: [id, displayName]
      properties:
        id:
          type: string
        displayName:
          type: string
    EhrPushResult:
      type: object
      required: [provider, ehrDocumentRef, pushedAt, mock]
      properties:
        provider:
          type: string
          description: "EHR provider name, e.g. \"athenahealth\", \"epic\", or \"mock\"."
        ehrDocumentRef:
          type: string
          description: Fully-qualified FHIR reference returned by the EHR (e.g. "DocumentReference/abc123").
        pushedAt:
          type: string
          format: date-time
        mock:
          type: boolean
          description: True when the push was synthesized locally because no EHR is configured.
    ScheduledAppointment:
      type: object
      required: [appointmentId, start, end, status, reason, patient]
      properties:
        appointmentId:
          type: string
        start:
          type: string
          format: date-time
        end:
          type: ["string", "null"]
          format: date-time
        status:
          type: string
        reason:
          type: ["string", "null"]
        patient:
          oneOf:
            - type: "null"
            - type: object
              required: [ehrId, display]
              properties:
                ehrId:
                  type: string
                display:
                  type: string
    PatientHistory:
      type: object
      required: [problems, medications, allergies]
      properties:
        problems:
          type: array
          items:
            type: object
            required: [id, text, onsetDate]
            properties:
              id:
                type: string
              text:
                type: string
              onsetDate:
                type: ["string", "null"]
        medications:
          type: array
          items:
            type: object
            required: [id, text, dosage]
            properties:
              id:
                type: string
              text:
                type: string
              dosage:
                type: ["string", "null"]
        allergies:
          type: array
          items:
            type: object
            required: [id, text, severity, reactions]
            properties:
              id:
                type: string
              text:
                type: string
              severity:
                type: ["string", "null"]
              reactions:
                type: array
                items:
                  type: string
    NoteTemplate:
      type: object
      required:
        - id
        - name
        - voiceCue
        - body
        - sortOrder
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        name:
          type: string
          minLength: 1
          maxLength: 120
        voiceCue:
          type: ["string", "null"]
          description: >-
            Phrase that, when heard at the start of dictation, swaps to
            this template. Lowercased server-side; null disables voice
            matching for this template (selection only).
        body:
          type: string
          description: Skeleton inserted into the textarea when the template is selected. May be empty.
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CreateTemplateRequest:
      type: object
      required: [name, body]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        voiceCue:
          type: ["string", "null"]
          maxLength: 80
        body:
          type: string
    UpdateTemplateRequest:
      type: object
      description: >-
        Partial update. Any provided field replaces; omitted fields are
        untouched. Pass voiceCue=null to clear the cue.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        voiceCue:
          type: ["string", "null"]
          maxLength: 80
        body:
          type: string
    ReorderTemplatesRequest:
      type: object
      required: [ids]
      properties:
        ids:
          type: array
          minItems: 0
          items:
            type: string
          description: >-
            All of the caller's template ids in their new desired order.
    EhrProviderConnection:
      type: object
      required: [connected]
      properties:
        connected:
          type: boolean
        practitionerId:
          type: ["string", "null"]
          description: Practitioner.id resolved from the SMART OAuth context.
        scope:
          type: ["string", "null"]
        expiresAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    EhrConnectionStatus:
      type: object
      required: [athenahealth]
      properties:
        athenahealth:
          $ref: "#/components/schemas/EhrProviderConnection"
    StartEhrOauthRequest:
      type: object
      properties:
        returnPath:
          type: string
          description: Same-origin path to navigate to after the callback completes (e.g. "/settings").
